<!doctype html>
<html lang="{{ site.Language.Locale | default `zh-CN` }}">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="{{ if eq .Section `docs` }}page-docs{{ end }}">
    {{ if eq .Section "docs" }}
      <button
        class="docs-nav-toggle"
        type="button"
        aria-controls="docs-sidebar"
        aria-expanded="true"
        aria-label="折叠目录"
        title="折叠目录"
      >
        <span class="docs-nav-toggle__icon" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
    {{ end }}

    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="{{ site.Home.RelPermalink }}">{{ site.Title }}</a>
        <nav class="main-nav" aria-label="主导航">
          <a href="{{ site.Home.RelPermalink }}" class="{{ if .IsHome }}is-active{{ end }}">首页</a>
          {{ with site.GetPage "section" "docs" }}
            <a href="{{ .RelPermalink }}" class="{{ if eq $.Section `docs` }}is-active{{ end }}">文档</a>
          {{ end }}
        </nav>
      </div>
    </header>

    <main class="site-main">
      {{ block "main" . }}{{ end }}
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        {{ site.Params.footer }}
      </div>
    </footer>

    {{ if eq .Section "docs" }}
      {{ partial "docs-nav-script.html" . }}
    {{ end }}
  </body>
</html>
