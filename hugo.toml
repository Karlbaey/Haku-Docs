baseURL = "/"
locale = "zh-CN"
title = "Haku Docs"
defaultContentLanguage = "zh-cn"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term", "RSS", "sitemap"]
hasCJKLanguage = true

[params]
description = "简洁、易读、轻量的 Hugo 文档站。"
footer = "由 Hugo 驱动，主题自动跟随系统明暗模式。"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
  anchorLineNos = false
  codeFences = true
  guessSyntax = true
  lineNos = false
  lineNumbersInTable = false
  noClasses = false
  style = "github-dark"
  tabWidth = 2
